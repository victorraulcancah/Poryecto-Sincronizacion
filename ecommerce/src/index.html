    <script>
      // Configurar el modo de consentimiento por defecto ANTES de cargar gtag
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);

      // Establecer el modo de consentimiento por defecto como 'denied'

      gtag("consent", "default", {

        ad_user_data: "denied",

    <!-- Estilos del loader de carga inicial -->
    <style>
          #initial-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
           background: linear-gradient(
        135deg,
        hsl(var(--main-h), 69%, 20%) 0%,
        hsl(var(--main-h), 69%, 36%) 50%,
        hsl(var(--main-h), 69%, 25%) 100%
      );
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
            overflow: hidden;
          }

          #initial-loader.fade-out {
            opacity: 0;
          }

          .loader-gif {
            width: 120px;
            height: 120px;
            max-width: 20vw;
            max-height: 20vw;
            object-fit: contain;
          }

          .loader-text {
            margin-top: 30px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            animation: fadeInText 1s ease-in-out infinite alternate;
            letter-spacing: 2px;
            text-transform: uppercase;
          }

          @keyframes fadeInText {
            0%, 100% {
              opacity: 0.7;
              text-shadow: 0 0 10px rgba(254, 46, 51, 0.3);
            }
            50% {
              opacity: 1;
              text-shadow: 0 0 20px rgba(254, 46, 51, 0.8);
            }
          }

          /* Estilos del SVG animado */
          .loader-svg {
            width: 200px;
            height: 200px;
            max-width: 40vw;
            max-height: 40vw;
            animation: spinRotate 4s linear infinite, pulseGlow 2s ease-in-out infinite, float 3s ease-in-out infinite, shimmer 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(254, 46, 51, 0.6)) drop-shadow(0 0 40px rgba(254, 46, 51, 0.3)) drop-shadow(0 0 60px rgba(254, 46, 51, 0.1));
            position: relative;
            z-index: 1;
          }

          /* Efecto de fondo animado detrás del logo - Onda 1 */
          #initial-loader::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(254, 46, 51, 0.15) 0%, rgba(254, 46, 51, 0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: radioPulse 2s ease-out infinite;
            z-index: 0;
          }

          /* Efecto de fondo animado detrás del logo - Onda 2 */
          #initial-loader::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(254, 46, 51, 0.08) 0%, rgba(254, 46, 51, 0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: radioPulse 2s ease-out infinite 0.5s;
            z-index: 0;
          }

          @keyframes spinRotate {
            from {
              transform: rotate(0deg) scale(1);
            }
            25% {
              transform: rotate(90deg) scale(1.08);
            }
            50% {
              transform: rotate(180deg) scale(1);
            }
            75% {
              transform: rotate(270deg) scale(1.08);
            }
            to {
              transform: rotate(360deg) scale(1);
            }
          }

          @keyframes pulseGlow {
            0% {
              filter: drop-shadow(0 0 5px rgba(254, 46, 51, 0.2)) drop-shadow(0 0 15px rgba(254, 46, 51, 0.1));
            }
            50% {
              filter: drop-shadow(0 0 25px rgba(254, 46, 51, 0.8)) drop-shadow(0 0 40px rgba(254, 46, 51, 0.4));
            }
            100% {
              filter: drop-shadow(0 0 5px rgba(254, 46, 51, 0.2)) drop-shadow(0 0 15px rgba(254, 46, 51, 0.1));
            }
          }

          @keyframes float {
            0%, 100% {
              transform: translateY(0px);
            }
            50% {
              transform: translateY(-10px);
            }
          }

          @keyframes radioPulse {
            0% {
              width: 200px;
              height: 200px;
              opacity: 1;
            }
            100% {
              width: 450px;
              height: 450px;
              opacity: 0;
            }
          }

          @keyframes shimmer {
            0%, 100% {
              filter: brightness(1);
            }
            50% {
              filter: brightness(1.2);
            }
          }

          /* Responsive adjustments */
          @media (max-width: 768px) {
            .loader-gif {
              width: 100px;
              height: 100px;
              object-fit: contain;
            }

            .loader-svg {
              width: 150px;
              height: 150px;
              max-width: 35vw;
              max-height: 35vw;
            }

            #initial-loader::before {
              width: 250px;
              height: 250px;
            }

            .loader-text {
              font-size: 14px;
              margin-top: 15px;
            }
          }

          @media (max-width: 480px) {
            .loader-gif {
              width: 80px;
              height: 80px;
              object-fit: contain;
            }

            .loader-svg {
              width: 120px;
              height: 120px;
              max-width: 30vw;
              max-height: 30vw;
            }

            #initial-loader::before {
              width: 200px;
              height: 200px;
            }

            .loader-text {
              font-size: 12px;
              margin-top: 10px;
            }
          }

  <body>
    <!-- Loader de carga inicial -->
    <div id="initial-loader">
      <!-- SVG del Logo animado (reemplaza el video) -->
      <img
        id="loader-svg-img"
        class="loader-svg"
        src="assets/images/logo/logo.svg"
        alt="7 Power"
        style="display: none"
      />

      <div class="loader-text" id="loader-text" style="display: none">
        Cargando 7 Power...
      </div>
    </div>

    <app-root></app-root>

    <!-- Script para remover el loader cuando Angular termine de cargar -->
    <script>
      let angularReady = false;
      let minimumTimeReached = false;

      // Detectar si es la primera carga de la sesión
      const isFirstLoad = !sessionStorage.getItem("hasLoadedBefore");
      const minimumTime = isFirstLoad ? 3000 : 100; // 3s primera vez, 0.1s después (muy rápido)

      // Mostrar el loader solo si es primera carga
      const loaderSvg = document.getElementById("loader-svg-img");
      const loaderText = document.getElementById("loader-text");
      const loader = document.getElementById("initial-loader");

      if (isFirstLoad) {
        // Primera carga: mostrar SVG completo con animaciones
        loaderSvg.style.display = "block";
        loaderText.style.display = "block";
        loaderText.textContent = "Cargando 7 Power...";
        // Marcar que ya se cargó una vez en esta sesión
        sessionStorage.setItem("hasLoadedBefore", "true");
      } else {
        // Navegación posterior: loader invisible (solo para esperar a Angular)
        loader.style.background = "transparent";
        loader.style.pointerEvents = "none";
      }

      // Función para remover el loader
      function removeInitialLoader() {
        if (loader) {
          loader.classList.add("fade-out");
          setTimeout(() => {
            loader.remove();
          }, 500);
        }
      }

      // Verificar si se puede remover el loader (ambas condiciones cumplidas)
      function checkRemoveLoader() {
        if (angularReady && minimumTimeReached) {
          removeInitialLoader();
        }
      }

      // Timer para el tiempo mínimo (3s o 0.1s según sea primera carga)
      setTimeout(() => {
        minimumTimeReached = true;
        checkRemoveLoader();
      }, minimumTime);

      // Escuchar cuando Angular termine de cargar
      document.addEventListener("DOMContentLoaded", function () {
        // Verificar periódicamente si Angular está listo
        const checkAngularReady = setInterval(() => {
          const appRoot = document.querySelector("app-root");
          if (appRoot && appRoot.children.length > 0) {
            angularReady = true;
            checkRemoveLoader();
            clearInterval(checkAngularReady);
          }
        }, 100);

        // Failsafe: remover el loader después de máximo 15 segundos
        setTimeout(() => {
          angularReady = true;
          minimumTimeReached = true;
          removeInitialLoader();
          clearInterval(checkAngularReady);
        }, 15000);
      });
    </script>
  </body>
